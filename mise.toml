[tools]
rust = "latest"
"cargo:cargo-edit" = "latest"

[tasks.build]
description = "Build the workspace"
run = "cargo build --workspace"

[tasks.test]
description = "Run workspace tests"
run = "cargo test --workspace"

[tasks.ci]
description = "Full CI flow: build then test"
run = """
#!/usr/bin/env bash
set -euo pipefail
./bin/mise run build
./bin/mise run test
"""

[tasks.update]
description = "Bump Rust toolchain to latest stable and upgrade all crate versions"
run = """
#!/usr/bin/env bash
set -euo pipefail
./bin/mise self-update || true
./bin/mise up --bump rust
cargo upgrade --incompatible --pinned
cargo update
"""
